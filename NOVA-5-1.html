<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>NOVA AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      background:#020c18;
      min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      font-family:'Share Tech Mono',monospace;
      overflow:hidden; user-select:none;
    }
    .grid {
      position:fixed; inset:0; z-index:0;
      background-image:linear-gradient(rgba(79,195,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,195,247,0.04) 1px,transparent 1px);
      background-size:40px 40px;
    }
    .scan { position:fixed; left:0; right:0; height:2px; z-index:1; background:linear-gradient(to right,transparent,rgba(79,195,247,0.15),transparent); animation:scan 6s linear infinite; pointer-events:none; }
    .topbar { position:fixed; top:0; left:0; right:0; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:14px 18px; background:rgba(2,12,24,0.95); border-bottom:1px solid rgba(79,195,247,0.12); }
    .logo { font-size:20px; font-weight:700; letter-spacing:6px; color:#4fc3f7; text-shadow:0 0 20px rgba(79,195,247,0.6); }
    .chip { font-size:9px; letter-spacing:1px; padding:5px 10px; border:1px solid rgba(79,195,247,0.2); border-radius:4px; background:rgba(79,195,247,0.05); }
    .orb-wrapper {
      position:relative; z-index:5;
      width:220px; height:220px;
      display:flex; align-items:center; justify-content:center;
      margin-top:60px; cursor:pointer; touch-action:manipulation;
    }
    .ring1 { position:absolute; width:210px; height:210px; border-radius:50%; border:1px solid rgba(79,195,247,0.2); animation:rotCW 12s linear infinite; }
    .ring2 { position:absolute; width:180px; height:180px; border-radius:50%; border:1px dashed rgba(79,195,247,0.1); animation:rotCCW 8s linear infinite; }
    .orb {
      position:relative; z-index:6;
      width:150px; height:150px; border-radius:50%;
      background:radial-gradient(circle at 35% 35%, rgba(79,195,247,0.18), rgba(2,12,24,0.97) 70%);
      border:2.5px solid rgba(79,195,247,0.5);
      box-shadow:0 0 35px rgba(79,195,247,0.35), 0 0 20px rgba(79,195,247,0.12) inset;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:8px; animation:pulse 2.5s ease-in-out infinite;
      transition:box-shadow 0.4s, border-color 0.4s; pointer-events:none;
    }
    .orb-icon { font-size:40px; color:#4fc3f7; }
    .orb-lbl { font-size:10px; letter-spacing:3px; color:#4fc3f7; }
    .think { width:48px; height:48px; border-radius:50%; border:3px solid transparent; border-top-color:#ffd54f; border-right-color:rgba(255,213,79,0.25); animation:spin 0.7s linear infinite; }
    svg#segs { position:absolute; top:0; left:0; pointer-events:none; }
    .waves { position:absolute; bottom:-48px; display:flex; align-items:flex-end; gap:4px; height:46px; pointer-events:none; }
    .wbar { width:4px; border-radius:4px; background:rgba(255,255,255,0.08); height:8px; }
    .box { z-index:2; margin-top:20px; width:88%; max-width:360px; background:rgba(4,20,40,0.92); border:1px solid rgba(79,195,247,0.2); border-radius:10px; padding:16px 18px; }
    .box-hdr { display:flex; align-items:center; gap:6px; margin-bottom:10px; }
    .box-dot { font-size:11px; color:#4fc3f7; }
    .box-ttl { font-size:8px; letter-spacing:3px; color:rgba(79,195,247,0.5); }
    .box-line { flex:1; height:1px; background:linear-gradient(to right,rgba(79,195,247,0.3),transparent); margin-left:6px; }
    .box-txt { font-size:16px; line-height:1.65; color:rgba(215,235,255,0.92); font-family:sans-serif; }
    .txcript { display:none; z-index:2; margin-top:14px; font-size:11px; color:rgba(79,195,247,0.8); background:rgba(79,195,247,0.05); border:1px solid rgba(79,195,247,0.15); border-radius:6px; padding:9px 16px; max-width:340px; text-align:center; }
    .txcript.on { display:block; }
    .hint { position:fixed; bottom:16px; font-size:9px; letter-spacing:2px; color:rgba(79,195,247,0.28); z-index:10; }
    .c { position:fixed; width:22px; height:22px; z-index:10; }
    .c-tl { top:0;left:0;border-top:2px solid rgba(79,195,247,0.3);border-left:2px solid rgba(79,195,247,0.3); }
    .c-tr { top:0;right:0;border-top:2px solid rgba(79,195,247,0.3);border-right:2px solid rgba(79,195,247,0.3); }
    .c-bl { bottom:0;left:0;border-bottom:2px solid rgba(79,195,247,0.3);border-left:2px solid rgba(79,195,247,0.3); }
    .c-br { bottom:0;right:0;border-bottom:2px solid rgba(79,195,247,0.3);border-right:2px solid rgba(79,195,247,0.3); }
    @keyframes scan { 0%{top:8%} 100%{top:92%} }
    @keyframes rotCW { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    @keyframes rotCCW { from{transform:rotate(0)} to{transform:rotate(-360deg)} }
    @keyframes pulse { 0%,100%{opacity:.85;transform:scale(1)} 50%{opacity:1;transform:scale(1.05)} }
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div class="grid"></div>
<div class="scan"></div>
<div class="c c-tl"></div><div class="c c-tr"></div><div class="c c-bl"></div><div class="c c-br"></div>

<div class="topbar">
  <span class="chip" id="schip" style="color:#4a6fa5">◈ BEKLİYOR</span>
  <div class="logo">N·O·V·A</div>
  <span class="chip" style="color:#4a6fa5">SYS v2.1</span>
</div>

<div class="orb-wrapper" id="orbBtn">
  <div class="ring1"></div>
  <div class="ring2"></div>
  <svg id="segs" width="220" height="220" viewBox="0 0 220 220"></svg>
  <div class="orb" id="orb">
    <div class="orb-icon" id="oic">◈</div>
    <div class="orb-lbl" id="olb">KONUŞ</div>
  </div>
  <div class="waves" id="waves"></div>
</div>

<div class="txcript" id="tx"><span style="color:#4fc3f7;font-weight:700">SİZ ›</span> <span id="txtext"></span></div>

<div class="box">
  <div class="box-hdr">
    <span class="box-dot" id="bdot">◈</span>
    <span class="box-ttl">NOVA YANITI</span>
    <div class="box-line"></div>
  </div>
  <div class="box-txt" id="btxt">NOVA aktif. Düğmeye basın ve konuşun.</div>
</div>

<div class="hint" id="hint">● Büyük daireye dokun ve konuş</div>

<script>
var S="idle", HIST=[], lastTx="", rec=null;
var C={idle:"#4a6fa5",listening:"#4fc3f7",thinking:"#ffd54f",speaking:"#00ffcc"};
var L={idle:"BEKLİYOR",listening:"DİNLİYOR",thinking:"İŞLİYOR",speaking:"KONUŞUYOR"};
var GEMINI_KEY="AIzaSyDA_7UcuMSkHYIwd__SijPO1eB7bKqb9ao";
var SYS="Sen NOVA adında ileri teknoloji bir yapay zeka asistanısın. Iron Man filmindeki JARVIS gibi konuşuyorsun — zeki, kibar, net ve profesyonel. Türkçe konuşuyorsun. Cevapların kısa ve net olsun (1-3 cümle). Efendim gibi kibarca başlayabilirsin. Saat/tarih sorulunca söyle. Mesaj gönderme isteğini simüle et. Oyun isterse metin tabanlı oyun başlat. ŞUANKI ZAMAN: "+new Date().toLocaleString("tr-TR");

// Wave bars
var wEl=document.getElementById("waves");
for(var i=0;i<16;i++){var b=document.createElement("div");b.className="wbar";b.id="wb"+i;wEl.appendChild(b);}

// SVG segments
function mkRing(col,sw){
  var svg=document.getElementById("segs"); svg.innerHTML="";
  for(var i=0;i<24;i++){
    var r=(i/24)*2*Math.PI,r1=88,r2=102;
    var l=document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",110+r1*Math.cos(r)); l.setAttribute("y1",110+r1*Math.sin(r));
    l.setAttribute("x2",110+r2*Math.cos(r)); l.setAttribute("y2",110+r2*Math.sin(r));
    l.setAttribute("stroke",col); l.setAttribute("stroke-width",sw||2);
    l.setAttribute("stroke-linecap","round"); l.setAttribute("opacity","0.3");
    l.id="sg"+i; svg.appendChild(l);
  }
}
mkRing("#1a3a5c",2);

(function loop(){
  var t=Date.now(),act=S==="listening",spk=S==="speaking";
  for(var i=0;i<16;i++){
    var b=document.getElementById("wb"+i); if(!b)continue;
    if(act||spk){b.style.height=(8+Math.abs(Math.sin(t/200+i*0.5))*(spk?36:22))+"px";b.style.background=spk?"rgba(0,255,204,"+(0.4+0.4*((i%3)/3))+")":"rgba(79,195,247,"+(0.3+0.4*((i%3)/3))+")";}
    else{b.style.height="8px";b.style.background="rgba(255,255,255,0.08)";}
  }
  if(act||spk){document.querySelectorAll("#segs line").forEach(function(l,j){l.setAttribute("opacity",0.2+0.6*Math.abs(Math.sin(t/300+j*0.3)));});}
  requestAnimationFrame(loop);
})();

function setS(s){
  S=s; var col=C[s];
  document.getElementById("schip").textContent="◈ "+L[s]; document.getElementById("schip").style.color=col;
  document.getElementById("bdot").style.color=col;
  document.getElementById("hint").textContent=s==="speaking"?"● Durdurmak için dokun":"● Büyük daireye dokun ve konuş";
  var o=document.getElementById("orb");
  o.style.borderColor=col+"88";
  o.style.boxShadow="0 0 "+(s==="speaking"?80:s==="listening"?55:32)+"px "+col+"44, 0 0 18px "+col+"18 inset";
  mkRing(s==="idle"?"#1a3a5c":col,s==="speaking"?3:2);
  if(s==="thinking"){o.innerHTML='<div class="think"></div>';}
  else{var ic=s==="speaking"?"◉":s==="listening"?"◎":"◈",lb=s==="speaking"?"KONUŞUYOR":s==="listening"?"DİNLİYOR":"KONUŞ";o.innerHTML='<div class="orb-icon" style="color:'+col+'">'+ic+'</div><div class="orb-lbl" style="color:'+col+'">'+lb+'</div>';}
}

function setR(t){var e=document.getElementById("btxt");e.style.animation="none";e.offsetHeight;e.style.animation="fadeUp 0.4s ease";e.textContent=t;}

function speak(txt){
  try{
    if(!window.speechSynthesis){setS("idle");return;}
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(txt);
    u.lang="tr-TR";u.rate=0.93;u.pitch=0.82;
    try{var vs=window.speechSynthesis.getVoices();var tv=vs.find(function(v){return v.lang&&v.lang.startsWith("tr");});if(tv)u.voice=tv;}catch(e){}
    u.onstart=function(){setS("speaking");};
    u.onend=function(){setS("idle");};
    u.onerror=function(){setS("idle");};
    window.speechSynthesis.speak(u);
  }catch(e){setS("idle");}
}

function callNova(txt){
  setS("thinking");
  HIST.push({role:"user",parts:[{text:txt}]});
  if(HIST.length>20)HIST=HIST.slice(-20);

  var url="https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+GEMINI_KEY;

  fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      system_instruction:{parts:[{text:SYS}]},
      contents:HIST
    })
  })
  .then(function(r){return r.json();})
  .then(function(d){
    var rep="Bir sorun oluştu efendim.";
    try{rep=d.candidates[0].content.parts[0].text||rep;}catch(e){}
    HIST.push({role:"model",parts:[{text:rep}]});
    setR(rep);speak(rep);
  })
  .catch(function(){
    var err="Bağlantı sorunu yaşıyorum efendim.";
    setR(err);speak(err);
  });
}

function startListen(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setR("Ses tanıma desteklenmiyor.");return;}
  rec=new SR(); rec.lang="tr-TR"; rec.continuous=false; rec.interimResults=true; lastTx="";
  rec.onstart=function(){setS("listening");document.getElementById("tx").classList.add("on");document.getElementById("txtext").textContent="...";};
  rec.onresult=function(e){var t=Array.from(e.results).map(function(r){return r[0].transcript;}).join("");lastTx=t;document.getElementById("txtext").textContent=t;};
  rec.onend=function(){document.getElementById("tx").classList.remove("on");if(lastTx.trim()){callNova(lastTx.trim());}else{setS("idle");}};
  rec.onerror=function(e){document.getElementById("tx").classList.remove("on");setS("idle");if(e.error==="not-allowed"){setR("Mikrofon izni reddedildi.");}};
  rec.start();
}

function handleTap(){
  if(S==="speaking"){try{window.speechSynthesis.cancel();}catch(e){}setS("idle");return;}
  if(S==="thinking"||S==="listening")return;
  startListen();
}

var btn=document.getElementById("orbBtn");
btn.addEventListener("touchend",function(e){e.preventDefault();handleTap();},{passive:false});
btn.addEventListener("click",function(){handleTap();});
</script>
</body>
</html>
